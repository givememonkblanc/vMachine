services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: okastro
      POSTGRES_PASSWORD: okastro
      POSTGRES_DB: okastro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okastro"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ../../.env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
